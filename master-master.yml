services:
  master1_netology:
    image: mysql:8.4
    container_name: master1_netology
    environment:
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - ./master1.cnf:/etc/mysql/conf.d/my.cnf
      - ./master1.sql:/docker-entrypoint-initdb.d/start.sql
    ports:
      - "3306:3306"
   
  master2_netology:
    image: mysql:8.4
    container_name: master2_netology
    environment:
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - ./master2.cnf:/etc/mysql/conf.d/my.cnf
      - ./master2.sql:/docker-entrypoint-initdb.d/start.sql
    ports:
      - "3307:3306"